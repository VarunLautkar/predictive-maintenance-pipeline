# ============================================================
# Predictive Maintenance Pipeline — Configuration
# ============================================================
# All paths, hyperparameters, and settings in one place.
# No hardcoded values in source code.
# ============================================================

data:
  raw_dir: "data/raw/CMaps"
  processed_dir: "data/processed"
  train_file: "train_FD001.txt"
  test_file: "test_FD001.txt"
  rul_file: "RUL_FD001.txt"

preprocessing:
  # Sensors with near-zero variance — carry no degradation signal
  drop_sensors: [1, 5, 6, 10, 16, 18, 19]
  # Operational settings to drop (low variance in FD001)
  drop_settings: [3]
  # Cap maximum RUL — engines don't degrade in early life
  max_rul: 125
  # Normalization method: "minmax" or "standard"
  scaler_type: "minmax"

feature_engineering:
  # Rolling window sizes for statistical features
  window_sizes: [5, 10, 20]
  # Features to compute per window
  rolling_features: ["mean", "std", "min", "max"]
  # Whether to add slope (rate-of-change) features
  add_slope: true
  slope_window: 10

training:
  # Train/validation split ratio
  val_split: 0.2
  random_state: 42
  
  models:
    random_forest:
      n_estimators: 100
      max_depth: 15
      min_samples_split: 5
      min_samples_leaf: 2
      random_state: 42
      n_jobs: -1
    
    xgboost:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      random_state: 42

evaluation:
  output_dir: "results"
  metrics_file: "metrics.json"
  # Asymmetric penalty: how much worse is a late prediction vs early
  late_penalty_factor: 2.0
